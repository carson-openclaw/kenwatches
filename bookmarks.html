<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <title data-i18n="bookmarks.title">Your Saved Watches - KenWatches</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh; overflow-x: hidden;
    }
    .section-container { max-width: 1400px; margin: 0 auto; padding: 0 2rem; }
    .bookmarks-page { padding: 8rem 0 4rem; }
    .bookmarks-header { text-align: center; margin-bottom: 3rem; }
    .bookmarks-header h1 { font-size: 2.8rem; margin-bottom: 0.8rem; }
    .bookmarks-header p { font-size: 1.2rem; color: #aaa; }
    .watch-scroller { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .watch-card {
      background: #1a1a1a; border-radius: 12px; overflow: hidden;
      border: 1px solid #222; transition: all 0.25s; position: relative;
    }
    .watch-card:hover { transform: translateY(-8px); border-color: #555; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .watch-image-container {
      height: 260px; padding: 20px; background: #111;
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .watch-img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .watch-info { padding: 1.1rem 1rem; text-align: center; }
    .watch-info h3 { font-size: 1.25rem; margin-bottom: 0.3rem; }
    .watch-reference { font-size: 0.95rem; color: #999; margin: 0.3rem 0 0.7rem; font-family: 'Courier New', monospace; }
    .price { font-size: 1.45rem; font-weight: 600; color: #c49a6c; margin: 0.3rem 0; }
    .condition { font-size: 0.9rem; color: #aaa; background: #222; padding: 0.3rem 0.9rem; border-radius: 20px; }
    .bookmark-btn {
      position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6);
      border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
      color: #c49a6c; transition: all 0.2s; z-index: 10;
    }
    .bookmark-btn:hover { background: rgba(0,0,0,0.8); transform: scale(1.1); }
    .bookmark-btn.bookmarked { color: #e74c3c; }
    .empty-state { text-align: center; padding: 5rem 2rem; }
    .empty-state i { font-size: 4rem; color: #444; margin-bottom: 1.5rem; }
    .empty-state h2 { font-size: 1.8rem; margin-bottom: 1rem; color: #888; }
    .empty-state p { color: #666; margin-bottom: 2rem; }
    .btn-primary {
      display: inline-block; padding: 1rem 2.2rem; background: #c49a6c; color: black;
      border-radius: 50px; font-size: 1.1rem; font-weight: 600;
      text-decoration: none; transition: all 0.25s;
    }
    .btn-primary:hover { background: #d4aa7c; transform: translateY(-2px); }
    .login-prompt { text-align: center; padding: 5rem 2rem; }
    .login-prompt i { font-size: 4rem; color: #444; margin-bottom: 1.5rem; }
    .login-prompt h2 { font-size: 1.8rem; margin-bottom: 1rem; color: #888; }
    .login-prompt p { color: #666; margin-bottom: 2rem; }
    @media (max-width: 768px) {
      .bookmarks-page { padding: 6rem 1rem 3rem; }
      .bookmarks-header h1 { font-size: 2rem; }
      .bookmarks-header p { font-size: 1rem; }
      .watch-scroller { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .watch-image-container { height: 200px; padding: 12px; }
      .watch-info { padding: 0.8rem; }
      .watch-info h3 { font-size: 1.05rem; }
      .watch-reference { font-size: 0.85rem; }
      .price { font-size: 1.2rem; }
      .condition { font-size: 0.8rem; padding: 0.25rem 0.7rem; }
      .section-container { padding: 0 1rem; }
    }
    @media (max-width: 400px) {
      .watch-scroller { grid-template-columns: 1fr; }
      .watch-image-container { height: 260px; }
    }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="bookmarks-page">
    <div class="section-container">
      <div class="bookmarks-header">
        <h1 data-i18n="bookmarks.title">Your Saved Watches</h1>
        <p data-i18n="bookmarks.subtitle">Watches you've bookmarked for later</p>
      </div>

      <!-- Login prompt (shown when not logged in) -->
      <div id="loginPrompt" class="login-prompt" style="display:none;">
        <i class="far fa-bookmark"></i>
        <h2 data-i18n="bookmarks.loginRequired">Sign in to view bookmarks</h2>
        <p data-i18n="bookmarks.loginDesc">Create an account or log in to save your favorite watches.</p>
        <a href="#" class="btn-primary" onclick="showAuthModal('login'); return false;" data-i18n="nav.login">Login</a>
      </div>

      <!-- Empty state (logged in but no bookmarks) -->
      <div id="emptyState" class="empty-state" style="display:none;">
        <i class="far fa-heart"></i>
        <h2 data-i18n="bookmarks.empty">No saved watches yet</h2>
        <p data-i18n="bookmarks.emptyDesc">Browse our collection and tap the heart icon to save watches you love.</p>
        <a href="shop.html" class="btn-primary" data-i18n="hero.shopNow">Shop Now</a>
      </div>

      <!-- Bookmarks grid -->
      <div id="bookmarksGrid" class="watch-scroller"></div>
    </div>
  </main>

  <script src="i18n.js"></script>
  <script src="auth.js"></script>
  <script src="mobile.js"></script>
  <script src="functions.js"></script>
  <script>
    // Load navigation
    fetch('nav.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('navbar-container').innerHTML = html;
        document.querySelectorAll('.nav-links a').forEach(link => {
          if (link.getAttribute('href') === 'bookmarks.html') link.classList.add('active');
        });
        initI18n();
        if (typeof initAuth === 'function') initAuth();
      });

    async function loadBookmarks() {
      const loginPrompt = document.getElementById('loginPrompt');
      const emptyState = document.getElementById('emptyState');
      const grid = document.getElementById('bookmarksGrid');

      const loggedIn = await isLoggedIn();
      if (!loggedIn) {
        loginPrompt.style.display = 'block';
        emptyState.style.display = 'none';
        grid.style.display = 'none';
        return;
      }

      const bookmarks = await getBookmarks();
      if (!bookmarks || bookmarks.length === 0) {
        loginPrompt.style.display = 'none';
        emptyState.style.display = 'block';
        grid.style.display = 'none';
        return;
      }

      loginPrompt.style.display = 'none';
      emptyState.style.display = 'none';
      grid.style.display = 'grid';
      grid.innerHTML = bookmarks.map(w => createBookmarkCard(w)).join('');
    }

    function createBookmarkCard(watch) {
      return `
        <div class="watch-card">
          <div class="watch-image-container">
            <img src="${watch.image}" alt="${watch.alt || watch.name}" class="watch-img"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22><rect fill=%22%23111%22 width=%22200%22 height=%22200%22/><text x=%2250%25%22 y=%2250%25%22 fill=%22%23555%22 font-size=%2240%22 text-anchor=%22middle%22 dy=%22.3em%22>⌚</text></svg>'">
            <button class="bookmark-btn bookmarked" onclick="removeBookmark('${watch.id}')" title="Remove bookmark">
              <i class="fas fa-heart"></i>
            </button>
          </div>
          <div class="watch-info">
            <h3>${watch.name || watch.model}</h3>
            <div class="watch-reference">${watch.reference}</div>
            <p class="price">${watch.price || watch.priceDisplay}</p>
            <span class="condition">${watch.condition || watch.conditionText}</span>
          </div>
        </div>
      `;
    }

    async function removeBookmark(watchId) {
      await toggleBookmark(watchId);
      loadBookmarks();
    }

    document.addEventListener('DOMContentLoaded', loadBookmarks);
  </script>
</body>
</html>
